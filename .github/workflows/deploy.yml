name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # ── 1. Go to project directory (clone if first run) ──────────────
            if [ ! -d "/opt/telegram-notion-bot/.git" ]; then
              echo "→ Cloning repository for the first time..."
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git /opt/telegram-notion-bot
            fi

            cd /opt/telegram-notion-bot

            # ── 2. Pull latest code ───────────────────────────────────────────
            echo "→ Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            # ── 3. Write .env file from GitHub secret ─────────────────────────
            echo "→ Writing .env file..."
            echo "${{ secrets.ENV_FILE }}" > .env

            # ── 4. Rebuild & restart containers ───────────────────────────────
            echo "→ Building Docker image..."
            docker compose build --no-cache

            echo "→ Restarting container..."
            docker compose down
            docker compose up -d

            # ── 5. Clean up dangling images ────────────────────────────────────
            echo "→ Pruning dangling images..."
            docker image prune -f

            echo "✅ Deployment complete!"