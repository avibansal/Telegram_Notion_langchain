version: '3.8'

services:
  bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: telegram_notion_bot_container
    # Ensure the container restarts on failure or system reboot, unless manually stopped
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Map local logs folder to container logs folder
      - ./logs:/app/logs
    # Set useful default environment variables for the container environment
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
